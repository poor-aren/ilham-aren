<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=0.35, minimum-scale=0.2, maximum-scale=2.0, user-scalable=yes">
    <title>My Activities - Muhammad Ilham | Aren</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { min-width: 1024px; zoom: 0.67; }
        
        .nav-link {
            position: relative; padding: 0.5rem 1rem; transition: all 0.3s ease;
            font-weight: 600; color: #4b5563;
        }
        .nav-link:hover { color: #1f2937; }
        .nav-link.active { color: #1f2937; }
        .nav-link::after {
            content: ''; position: absolute; bottom: 0; left: 50%; width: 0; height: 3px;
            background: #FBC605; transform: translateX(-50%); transition: width 0.3s ease;
        }
        .nav-link:hover::after, .nav-link.active::after { width: 80%; }

        /* Grid pattern background */
        .scrapbook-page {
            background: #fef9f3;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(251, 198, 5, 0.1) 49px, rgba(251, 198, 5, 0.1) 50px),
                repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(251, 198, 5, 0.1) 49px, rgba(251, 198, 5, 0.1) 50px);
            padding: 60px 50px;
            position: relative;
        }

        /* Floating doodles */
        .doodle-shape {
            position: absolute;
            opacity: 0.15;
            pointer-events: none;
            font-size: 80px;
            animation: float-doodle 8s ease-in-out infinite;
        }

        @keyframes float-doodle {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* Subtle masculine hover - no bouncing */
        .scrapbook-card {
            transition: all 0.3s ease;
        }

    </style>
</head>
<body class="text-gray-900 min-h-screen" style="background-image: url('./assets/background.jpg'); background-size: cover; background-position: center;">
    
    <div class="max-w-6xl mx-auto px-6 py-12">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden mb-12" style="max-width: 1152px; margin-left: auto; margin-right: auto;">
            
            <!-- Navigation -->
            <div style="background: white;">
                <nav class="flex justify-end gap-1 px-8 py-4">
                    <a href="./index.html" class="nav-link text-base">HOME</a>
                    <a href="./certificates.html" class="nav-link text-base">MY CERTIFICATES</a>
                    <a href="./activities.html" class="nav-link active text-base">MY ACTIVITIES</a>
                    <a href="./aboutme.html" class="nav-link text-base">ABOUT ME</a>
                </nav>
            </div>

            <!-- Header with hand-drawn style -->
            <div style="background: white; padding: 50px 40px; text-align: center; border-bottom: 4px solid #FBC605; position: relative;">
                <!-- Corner decorations -->
                <div style="position: absolute; top: 15px; left: 30px; width: 40px; height: 40px; border-top: 4px solid #FBC605; border-left: 4px solid #FBC605; opacity: 0.4;"></div>
                <div style="position: absolute; top: 15px; right: 30px; width: 40px; height: 40px; border-top: 4px solid #FBC605; border-right: 4px solid #FBC605; opacity: 0.4;"></div>
                <div style="position: absolute; bottom: 15px; left: 30px; width: 40px; height: 40px; border-bottom: 4px solid #FBC605; border-left: 4px solid #FBC605; opacity: 0.4;"></div>
                <div style="position: absolute; bottom: 15px; right: 30px; width: 40px; height: 40px; border-bottom: 4px solid #FBC605; border-right: 4px solid #FBC605; opacity: 0.4;"></div>
                
                <h1 class="text-5xl font-black mb-4" style="color: #343639;">
                    MY <span style="color: #FBC605; position: relative;">
                        ADVENTURES
                        <svg style="position: absolute; bottom: -10px; left: 0; width: 100%;" height="8" viewBox="0 0 200 8">
                            <path d="M2 5C50 2 100 6 198 3" stroke="#FBC605" stroke-width="4" stroke-linecap="round"/>
                        </svg>
                    </span>
                </h1>
                <p class="text-gray-600 text-lg font-medium">
                    📸 Events • 🏆 Competitions • ✈️ Conferences
                </p>
            </div>

            <!-- Scrapbook with grid pattern -->
            <div class="scrapbook-page">
                <!-- Floating doodles -->
                <div class="doodle-shape" style="top: 5%; left: 3%; animation-delay: 0s;">✏️</div>
                <div class="doodle-shape" style="top: 15%; right: 5%; animation-delay: 1s;">📌</div>
                <div class="doodle-shape" style="bottom: 20%; left: 8%; animation-delay: 2s;">✂️</div>
                <div class="doodle-shape" style="bottom: 10%; right: 4%; animation-delay: 3s;">🎨</div>
                
                <div id="activities-container" class="cute-grid"></div>
                <div id="empty-state" class="text-center py-20" style="display: none;">
                    <div class="text-6xl mb-4">📸</div>
                    <h3 class="text-2xl font-black mb-2" style="color: #343639;">No Activities Yet</h3>
                    <p class="text-gray-600">Activities will appear here once added to activities.json</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-content">
            <div class="close-btn" onclick="closeLightbox()">×</div>
            <div class="lightbox-nav prev" onclick="navigateLightbox(-1)">‹</div>
            <div class="lightbox-nav next" onclick="navigateLightbox(1)">›</div>
            <img id="lightbox-img" class="lightbox-img" src="" alt="">
        </div>
    </div>

    <script>
        let activitiesData = [], currentLightboxActivity = null, currentLightboxIndex = 0;
        let slideshowIntervals = {}, currentSlides = {};
        const stickers = ['🎉', '⭐', '🏆', '✨', '🎯', '🎨', '📸', '🚀'];
        const washiStyles = ['washi-yellow', 'washi-pink', 'washi-blue'];

        async function loadActivities() {
            try {
                const response = await fetch('./assets/activities/activities.json');
                activitiesData = await response.json();
                
                const container = document.getElementById('activities-container');
                if (activitiesData.length === 0) {
                    container.style.display = 'none';
                    document.getElementById('empty-state').style.display = 'block';
                    return;
                }
                
                container.innerHTML = '';
                
                activitiesData.forEach((activity, i) => {
                    const card = document.createElement('div');
                    card.className = 'scrapbook-card';
                    
                    let galleryHTML = activity.images.map((img, j) => 
                        `<img src="./assets/activities/${img}" alt="${activity.title}" 
                              class="gallery-photo ${j === 0 ? 'active' : ''}"
                              onerror="this.src='https://via.placeholder.com/600x280?text=Activity'">`
                    ).join('');

                    let dotsHTML = activity.images.length > 1 ? 
                        activity.images.map((_, j) => 
                            `<div class="cute-dot ${j === 0 ? 'active' : ''}" onclick="goToSlide(${i}, ${j})"></div>`
                        ).join('') : '';

                    let navHTML = activity.images.length > 1 ? 
                        `<div class="nav-bubble prev" onclick="event.stopPropagation(); changeSlide(${i}, -1)">‹</div>
                         <div class="nav-bubble next" onclick="event.stopPropagation(); changeSlide(${i}, 1)">›</div>` : '';
                    
                    const washiClass = washiStyles[i % washiStyles.length];
                    
                    card.innerHTML = `
                        <div class="washi-tape ${washiClass}"></div>
                        <div class="sticker-badge">${stickers[i % stickers.length]}</div>
                        <div class="corner-deco top-left"></div>
                        <div class="corner-deco bottom-right"></div>
                        <div class="photo-gallery" onclick="openLightbox(${i}, ${currentSlides[i] || 0})">
                            ${galleryHTML}${navHTML}
                            ${activity.images.length > 1 ? `<div class="cute-photo-count">📸 ${activity.images.length}</div><div class="dot-row">${dotsHTML}</div>` : ''}
                        </div>
                        <div class="card-content">
                            <div class="event-title-cute"><span>📍 ${activity.title}</span></div>
                            <div class="event-desc-cute">${activity.description}</div>
                        </div>
                    `;
                    
                    container.appendChild(card);

                    if (activity.images.length > 1) {
                        currentSlides[i] = 0;
                        startSlideshow(i);
                    }
                });
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('empty-state').style.display = 'block';
            }
        }

        function startSlideshow(i) {
            slideshowIntervals[i] = setInterval(() => changeSlide(i, 1), 4000);
        }

        function changeSlide(i, dir) {
            const activity = activitiesData[i];
            const card = document.getElementById('activities-container').children[i];
            const images = card.querySelectorAll('.gallery-photo');
            const dots = card.querySelectorAll('.cute-dot');
            
            if (!currentSlides[i]) currentSlides[i] = 0;
            
            images[currentSlides[i]].classList.remove('active');
            if (dots.length) dots[currentSlides[i]].classList.remove('active');
            
            currentSlides[i] = (currentSlides[i] + dir + activity.images.length) % activity.images.length;
            
            images[currentSlides[i]].classList.add('active');
            if (dots.length) dots[currentSlides[i]].classList.add('active');
        }

        function goToSlide(i, j) {
            const card = document.getElementById('activities-container').children[i];
            const images = card.querySelectorAll('.gallery-photo');
            const dots = card.querySelectorAll('.cute-dot');
            
            images[currentSlides[i]].classList.remove('active');
            dots[currentSlides[i]].classList.remove('active');
            
            currentSlides[i] = j;
            
            images[currentSlides[i]].classList.add('active');
            dots[currentSlides[i]].classList.add('active');
        }

        function openLightbox(i, j) {
            currentLightboxActivity = i;
            currentLightboxIndex = j;
            document.getElementById('lightbox-img').src = `./assets/activities/${activitiesData[i].images[j]}`;
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = 'auto';
            currentLightboxActivity = null;
            currentLightboxIndex = 0;
        }

        function navigateLightbox(dir) {
            if (currentLightboxActivity === null) return;
            const activity = activitiesData[currentLightboxActivity];
            currentLightboxIndex = (currentLightboxIndex + dir + activity.images.length) % activity.images.length;
            document.getElementById('lightbox-img').src = `./assets/activities/${activity.images[currentLightboxIndex]}`;
        }

        document.getElementById('lightbox').addEventListener('click', e => { if (e.target === e.currentTarget) closeLightbox(); });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeLightbox();
            else if (e.key === 'ArrowLeft') navigateLightbox(-1);
            else if (e.key === 'ArrowRight') navigateLightbox(1);
        });

        loadActivities();
    </script>
</body>
</html>
