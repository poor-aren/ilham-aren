<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Activities — Muhammad Ilham | Aren</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --yellow:  #FBC605;
  --black:   #1a1a1a;
  --dark:    #343639;
  --white:   #ffffff;
  --bg:      #ffffff;
  --grid:    #d0d0d0;
  --gray:    #888;
  --cream:   #fef9f3;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 30px 30px;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 16px;
}

/* ── MAIN CARD ── */
.main-card {
  width: 100%; max-width: 420px;
  background: var(--white);
  border-radius: 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,.13), 0 2px 8px rgba(0,0,0,.08);
  overflow: hidden;
  animation: popIn .45s cubic-bezier(.34,1.56,.64,1) both;
}

/* ── NAV ── */
.card-nav {
  border-bottom: 2px solid var(--black);
  background: var(--white);
}
.nav-row { display:flex; width:100%; justify-content:flex-end; }
.nav-link {
  font-family: 'Space Mono', monospace;
  font-size: 9px; font-weight: 700; letter-spacing: .4px;
  color: var(--black); text-decoration: none;
  padding: 11px 14px;
  border-bottom: 3px solid transparent;
  white-space: nowrap; transition: all .18s;
}
.nav-link.active { border-bottom-color: var(--yellow); }
.nav-link:hover  { background: #fffbe6; }

/* ── PAGE HEADER ── */
.page-header {
  background: var(--white);
  border-bottom: 3px solid var(--yellow);
  padding: 24px 22px 0;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.page-header h1 {
  font-size: 22px; font-weight: 900;
  color: var(--dark); letter-spacing: -.5px;
  margin-bottom: 10px;
}
.page-header h1 .word {
  color: var(--yellow);
  position: relative;
  display: inline-block;
}
/* ── PIXEL ART HEADER SCENE ── */
.page-header {
  position: relative;
  overflow: hidden;
  height: 140px;
  border-bottom: 3px solid var(--yellow);
  image-rendering: pixelated;
}

/* sky layer */
.sky {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, #4ab8f0 0%, #7dd4f7 45%, #b0e8fa 75%, #d8f4fd 100%);
}

/* sun */
.sun {
  position: absolute;
  top: 10px; right: 28px;
  width: 20px; height: 20px;
  background: #FBC605;
  box-shadow: 0 0 0 4px rgba(251,198,5,.3), 0 0 12px rgba(251,198,5,.5);
  animation: sunPulse 4s ease-in-out infinite alternate;
}
.sun::before {
  content: '';
  position: absolute;
  top: -6px; left: 8px;
  width: 4px; height: 32px;
  background: rgba(251,198,5,.35);
}
.sun::after {
  content: '';
  position: absolute;
  top: 8px; left: -6px;
  width: 32px; height: 4px;
  background: rgba(251,198,5,.35);
}
@keyframes sunPulse {
  from { box-shadow: 0 0 0 4px rgba(251,198,5,.25), 0 0 12px rgba(251,198,5,.4); }
  to   { box-shadow: 0 0 0 7px rgba(251,198,5,.38), 0 0 22px rgba(251,198,5,.6); }
}

/* sea layer */
.sea {
  position: absolute;
  bottom: 22px; left: 0; right: 0;
  height: 48px;
  background: linear-gradient(to bottom, #1e9bd1 0%, #1479a8 60%, #0d5e86 100%);
  border-top: 4px solid #0d96c8;
}

/* sand beach */
.sand {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 22px;
  background: linear-gradient(to bottom, #f5d98a 0%, #e8c56a 60%, #d4a940 100%);
}

/* sand decorations */
.sand-deco {
  position: absolute;
  bottom: 0; left: 0;
  height: 22px;
  width: 100%;
}

/* cloud strip — scrolls right to left */
.clouds {
  position: absolute;
  top: 4px; left: 0;
  height: 42px;
  width: 800px;
  animation: scrollClouds 38s linear infinite;
}

/* individual boat strips — each at different vertical position */
.boat-a {
  position: absolute;
  bottom: 30px; left: 0;
  height: 40px;
  width: 800px;
  animation: scrollBoat1 32s linear infinite;
}
.boat-b {
  position: absolute;
  bottom: 22px; left: 0;
  height: 40px;
  width: 800px;
  animation: scrollBoat2 44s linear infinite;
  animation-delay: -14s;
}
.boat-c {
  position: absolute;
  bottom: 26px; left: 0;
  height: 40px;
  width: 800px;
  animation: scrollBoat3 38s linear infinite;
  animation-delay: -8s;
}

@keyframes scrollClouds {
  from { transform: translateX(0); }
  to   { transform: translateX(-400px); }
}
@keyframes scrollBoat1 {
  from { transform: translateX(460px); }
  to   { transform: translateX(-400px); }
}
@keyframes scrollBoat2 {
  from { transform: translateX(460px); }
  to   { transform: translateX(-400px); }
}
@keyframes scrollBoat3 {
  from { transform: translateX(460px); }
  to   { transform: translateX(-400px); }
}

/* title overlay */
.header-title {
  position: absolute;
  inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 10;
  pointer-events: none;
}
.header-title h1 {
  font-size: 20px; font-weight: 900;
  color: var(--dark);
  letter-spacing: -.5px;
  background: rgba(255,255,255,.82);
  padding: 4px 16px 5px;
  border-radius: 4px;
  border: 2px solid var(--dark);
  box-shadow: 3px 3px 0 var(--yellow);
  line-height: 1;
  margin-bottom: 5px;
}
.header-title h1 .adv { color: var(--yellow); }
.header-title p {
  font-family: 'Space Mono', monospace;
  font-size: 8px; color: var(--dark);
  background: rgba(255,255,255,.7);
  padding: 2px 10px; border-radius: 100px;
  font-weight: 700;
}

/* ── SCRAPBOOK SECTION ── */
.scrapbook {
  background: var(--cream);
  padding: 18px 16px 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* Loading */
.loading-state { text-align:center; padding:48px 20px; }
.loading-dots { display:flex; justify-content:center; gap:6px; margin-bottom:10px; }
.loading-dots span {
  width:8px; height:8px; border-radius:50%;
  background: var(--dark); opacity:.3;
  animation: dotBounce .8s ease-in-out infinite;
}
.loading-dots span:nth-child(2){ animation-delay:.15s; }
.loading-dots span:nth-child(3){ animation-delay:.30s; }
.loading-text {
  font-family:'Space Mono',monospace; font-size:10px; color:var(--gray);
}

/* Empty */
.empty-state { text-align:center; padding:48px 20px; display:none; }
.empty-state p { font-family:'Space Mono',monospace; font-size:10px; color:var(--gray); margin-top:8px; }

/* ── SCRAPBOOK CARD ── */
.scrapbook-card {
  background: var(--white);
  border: 2.5px solid var(--dark);
  border-radius: 16px;
  overflow: hidden;
  position: relative;
  box-shadow: 4px 4px 0 var(--dark);
  transition: transform .2s, box-shadow .2s;
}
.scrapbook-card:nth-child(odd)  { transform: rotate(-.5deg); }
.scrapbook-card:nth-child(even) { transform: rotate(.5deg);  }
.scrapbook-card:active {
  transform: rotate(0deg) translateY(-3px) !important;
  box-shadow: 6px 6px 0 var(--yellow) !important;
  border-color: var(--yellow);
}

/* Washi tape strip removed */
.washi, .washi-yellow, .washi-pink, .washi-blue { display: none; }

/* ── PHOTO GALLERY ── */
.photo-gallery {
  position: relative;
  aspect-ratio: 16/9;
  overflow: hidden;
  background: #f3f4f6;
  margin: 0;
  border-radius: 0;
  border: none;
  cursor: pointer;
}
.gallery-photo {
  width:100%; height:100%;
  object-fit: cover;
  position: absolute; inset: 0;
  opacity: 0;
  transition: opacity .5s ease;
}
.gallery-photo.active { opacity:1; }

/* photo counter badge */
.photo-count {
  position: absolute;
  top: 8px; left: 8px;
  background: white;
  color: var(--dark);
  font-family: 'Space Mono', monospace;
  font-size: 8px; font-weight: 700;
  padding: 3px 9px;
  border-radius: 100px;
  border: 2px solid var(--dark);
  z-index: 10;
}

/* nav arrows */
.gal-btn {
  position: absolute; top:50%; transform: translateY(-50%);
  width: 28px; height: 28px;
  background: white; border: 2px solid var(--dark);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 900; cursor: pointer;
  z-index: 10; transition: all .15s;
  color: var(--dark);
  -webkit-tap-highlight-color: transparent;
}
.gal-btn:active { background: var(--yellow); }
.gal-btn.prev { left: 7px; }
.gal-btn.next { right: 7px; }

/* dot indicators */
.dot-row {
  position: absolute; bottom: 7px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 5px; z-index:10;
}
.dot {
  width: 7px; height: 7px;
  background: rgba(52,54,57,.3);
  border-radius: 50%; cursor: pointer;
  border: 1.5px solid white;
  transition: all .2s;
}
.dot.active {
  background: var(--yellow);
  transform: scale(1.4);
  border-color: var(--dark);
}

/* ── CARD CONTENT ── */
.card-content { padding: 14px 14px 16px; }

.activity-title {
  font-size: 13px; font-weight: 900;
  color: var(--dark); line-height: 1.3;
  margin-bottom: 6px;
  display: flex; align-items: flex-start; gap: 6px;
}
.activity-title .pin-dot {
  width: 8px; height: 8px;
  background: var(--yellow); border-radius: 50%;
  border: 1.5px solid var(--dark);
  flex-shrink: 0; margin-top: 4px;
}
.activity-desc {
  font-size: 11px; color: #555;
  line-height: 1.6; font-weight: 500;
  margin-bottom: 10px;
}
.activity-link {
  display: inline-block;
  font-family: 'Space Mono', monospace;
  font-size: 8.5px; font-weight: 700;
  background: var(--dark); color: var(--yellow);
  padding: 6px 14px; border-radius: 8px;
  text-decoration: none; letter-spacing: .3px;
  transition: all .15s;
}
.activity-link:active {
  background: var(--yellow); color: var(--dark);
}

/* ── FOOTER ── */
.card-footer {
  border-top: 2px solid #eeeeea;
  padding: 13px 18px;
  display: flex; align-items: center; justify-content: space-between;
}
.socials { display:flex; gap:7px; }
.soc-btn {
  width:35px; height:35px;
  border: 2px solid var(--black); border-radius:9px;
  background: var(--white);
  display:flex; align-items:center; justify-content:center;
  color: var(--black); text-decoration:none;
  transition: all .12s;
}
.soc-btn:active { transform:translate(2px,2px); }
.soc-btn svg { width:15px; height:15px; }
.footer-copy {
  font-family:'Space Mono',monospace; font-size:7.5px;
  color: var(--gray); white-space:nowrap;
}

/* ── LIGHTBOX ── */
.lightbox {
  position: fixed; inset:0;
  background: rgba(0,0,0,.9);
  display: none; align-items:center; justify-content:center;
  z-index: 9999; opacity:0;
  transition: opacity .25s;
  padding: 20px;
}
.lightbox.active { display:flex; opacity:1; }
.lb-wrap {
  position: relative;
  width:100%; max-width:360px;
  transform: scale(.85);
  transition: transform .35s cubic-bezier(.175,.885,.32,1.275);
}
.lightbox.active .lb-wrap { transform: scale(1); }
.lb-img {
  width:100%; display:block;
  border: 8px solid white;
  border-radius: 4px;
  box-shadow: 0 16px 48px rgba(0,0,0,.5);
}
.lb-close {
  position:absolute; top:-14px; right:-14px;
  width:38px; height:38px;
  background: var(--yellow); color: var(--dark);
  border-radius:50%; border:3px solid white;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; font-weight:900; cursor:pointer;
  z-index:10;
  transition: transform .2s;
}
.lb-close:active { transform: rotate(90deg) scale(1.1); }
.lb-nav {
  position:absolute; top:50%; transform:translateY(-50%);
  width:36px; height:36px;
  background:white; border:2px solid var(--dark);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; font-weight:900; cursor:pointer; color:var(--dark);
  transition: background .15s;
}
.lb-nav:active { background: var(--yellow); }
.lb-nav.prev { left:-18px; }
.lb-nav.next { right:-18px; }

/* ── KEYFRAMES ── */
@keyframes popIn {
  from { opacity:0; transform:scale(.94) translateY(14px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}
@keyframes dotBounce {
  0%,80%,100% { transform:scale(.8); opacity:.3; }
  40%          { transform:scale(1.2); opacity:1; }
}

@media(min-width:480px){
  body { padding:32px 16px; align-items:center; }
}
</style>
</head>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
const JSONBIN_KEY = '$2a$10$0p5f.8.7MaVHfCRw6y28wuozbrEphXg0vBuLRVccJXXZgGIL0kpD.';
const JSONBIN_BIN = '6989f92bd0ea881f40ad5b6c';
const WASHI      = ['washi-yellow','washi-pink','washi-blue'];

let activitiesData = [];
let currentSlides  = {};
let lbActivity = null, lbIndex = 0;

async function loadActivities() {
  try {
    const res  = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN}/latest`, {
      headers: { 'X-Master-Key': JSONBIN_KEY }
    });
    const data = await res.json();
    activitiesData = (data.record.activities || []).filter(a => a !== null);

    document.getElementById('loading').style.display = 'none';

    if (!activitiesData.length) {
      document.getElementById('empty').style.display = 'block';
      return;
    }

    const container = document.getElementById('activities-container');
    container.style.display = 'grid';
    container.style.gridTemplateColumns = '1fr 1fr';
    container.style.gap = '16px';

    activitiesData.forEach((act, i) => {
      currentSlides[i] = 0;
      const washi = WASHI[i % WASHI.length];
      const multi = act.images.length > 1;

      const card = document.createElement('div');
      card.className = 'scrapbook-card';

      const imgs = act.images.map((src, j) =>
        `<img src="${src}" alt="${act.title}"
              class="gallery-photo ${j===0?'active':''}"
              onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22225%22%3E%3Crect fill=%22%23e5e7eb%22 width=%22400%22 height=%22225%22/%3E%3Ctext fill=%22%23aaa%22 font-family=%22Arial%22 font-size=%2216%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22%3EPhoto%3C/text%3E%3C/svg%3E'">`
      ).join('');

      const dots = multi ? act.images.map((_,j) =>
        `<div class="dot ${j===0?'active':''}" onclick="goSlide(${i},${j})"></div>`
      ).join('') : '';

      const navBtns = multi
        ? `<div class="gal-btn prev" onclick="event.stopPropagation();changeSlide(${i},-1)">‹</div>
           <div class="gal-btn next" onclick="event.stopPropagation();changeSlide(${i},1)">›</div>`
        : '';

      const counter = multi
        ? `<div class="photo-count">${act.images.length} photos</div>`
        : '';

      const linkBtn = act.link
        ? `<a href="${act.link}" target="_blank" rel="noopener" class="activity-link">view link →</a>`
        : '';

      card.innerHTML = `
        <div class="washi ${washi}"></div>
        <div class="photo-gallery" onclick="openLB(${i}, currentSlides[${i}])">
          ${imgs}${navBtns}${counter}
          ${multi ? `<div class="dot-row">${dots}</div>` : ''}
        </div>
        <div class="card-content">
          <div class="activity-title">
            <div class="pin-dot"></div>
            <span>${act.title}</span>
          </div>
          <p class="activity-desc">${act.description}</p>
          ${linkBtn}
        </div>`;

      container.appendChild(card);

      // auto slideshow
      if (multi) setInterval(() => changeSlide(i, 1), 4000);
    });

  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
  }
}

function changeSlide(i, dir) {
  const act  = activitiesData[i];
  const card = document.getElementById('activities-container').children[i];
  const imgs = card.querySelectorAll('.gallery-photo');
  const dots = card.querySelectorAll('.dot');
  imgs[currentSlides[i]].classList.remove('active');
  if (dots.length) dots[currentSlides[i]].classList.remove('active');
  currentSlides[i] = (currentSlides[i] + dir + act.images.length) % act.images.length;
  imgs[currentSlides[i]].classList.add('active');
  if (dots.length) dots[currentSlides[i]].classList.add('active');
}

function goSlide(i, j) {
  const card = document.getElementById('activities-container').children[i];
  const imgs = card.querySelectorAll('.gallery-photo');
  const dots = card.querySelectorAll('.dot');
  imgs[currentSlides[i]].classList.remove('active');
  dots[currentSlides[i]].classList.remove('active');
  currentSlides[i] = j;
  imgs[j].classList.add('active');
  dots[j].classList.add('active');
}

/* Lightbox */
function openLB(i, j) {
  lbActivity = i; lbIndex = j;
  document.getElementById('lb-img').src = activitiesData[i].images[j];
  const lb = document.getElementById('lightbox');
  lb.style.display = 'flex';
  requestAnimationFrame(() => lb.classList.add('active'));
  document.body.style.overflow = 'hidden';
  // hide nav if single image
  const single = activitiesData[i].images.length <= 1;
  document.getElementById('lb-prev').style.display = single ? 'none' : 'flex';
  document.getElementById('lb-next').style.display = single ? 'none' : 'flex';
}
function closeLB() {
  const lb = document.getElementById('lightbox');
  lb.classList.remove('active');
  setTimeout(() => lb.style.display = 'none', 280);
  document.body.style.overflow = '';
}
function navLB(dir) {
  if (lbActivity === null) return;
  const act = activitiesData[lbActivity];
  lbIndex = (lbIndex + dir + act.images.length) % act.images.length;
  document.getElementById('lb-img').src = act.images[lbIndex];
}

document.getElementById('lb-close').addEventListener('click', closeLB);
document.getElementById('lb-prev').addEventListener('click', () => navLB(-1));
document.getElementById('lb-next').addEventListener('click', () => navLB(1));
document.getElementById('lightbox').addEventListener('click', e => { if(e.target===e.currentTarget) closeLB(); });
document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeLB();
  if (e.key === 'ArrowLeft')  navLB(-1);
  if (e.key === 'ArrowRight') navLB(1);
});

loadActivities();
</script>
