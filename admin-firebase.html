<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Admin - Muhammad Ilham</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js';
        import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        
        // Firebase Configuration
        // REPLACE WITH YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const db = getFirestore(app);
        
        // Make Firebase globally available
        window.firebaseStorage = storage;
        window.firebaseDB = db;
        window.firebaseRef = ref;
        window.firebaseUploadBytes = uploadBytes;
        window.firebaseGetDownloadURL = getDownloadURL;
        window.firebaseDeleteObject = deleteObject;
        window.firebaseCollection = collection;
        window.firebaseGetDocs = getDocs;
        window.firebaseAddDoc = addDoc;
        window.firebaseUpdateDoc = updateDoc;
        window.firebaseDeleteDoc = deleteDoc;
        window.firebaseDoc = doc;
        window.firebaseSetDoc = setDoc;
        
        console.log('✅ Firebase initialized');
    </script>
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        
        .tab-btn {
            padding: 12px 24px;
            border-radius: 8px 8px 0 0;
            font-weight: 600;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .tab-btn.active {
            background: #FBC605;
            color: #343639;
        }
        
        .tab-btn:not(.active) {
            background: #e5e7eb;
            color: #6b7280;
        }
        
        .tab-btn:not(.active):hover {
            background: #d1d5db;
        }
        
        .card-item {
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px;
            transition: all 0.3s;
        }
        
        .card-item:hover {
            border-color: #FBC605;
            box-shadow: 0 4px 12px rgba(251, 198, 5, 0.2);
        }
        
        .btn-primary {
            background: #FBC605;
            color: #343639;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }
        
        .btn-primary:hover {
            background: #e5b105;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(251, 198, 5, 0.3);
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }
        
        .btn-danger:hover {
            background: #dc2626;
        }
        
        .btn-secondary {
            background: #6b7280;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }
        
        .btn-secondary:hover {
            background: #4b5563;
        }
        
        .upload-zone {
            border: 3px dashed #d1d5db;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            background: #f9fafb;
        }
        
        .upload-zone:hover {
            border-color: #FBC605;
            background: #fffbf0;
        }
        
        .upload-zone.dragover {
            border-color: #FBC605;
            background: #fffbf0;
            transform: scale(1.02);
        }
        
        .preview-img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            border: 3px solid #FBC605;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }
        
        .badge-cert {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .badge-activity {
            background: #fce7f3;
            color: #be123c;
        }
        
        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-weight: 600;
        }
        
        .alert-success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .alert-warning {
            background: #fef3c7;
            color: #92400e;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <!-- Header -->
    <header class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-6 py-6">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-black" style="color: #343639;">
                        📁 Portfolio Admin
                    </h1>
                    <p class="text-gray-600 mt-1">Manage your certificates & activities</p>
                </div>
                <div>
                    <button onclick="syncFromFirebase()" class="btn-primary">
                        🔄 Sync from Firebase
                    </button>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 py-8">
        
        <!-- Alert Area -->
        <div id="alert-area"></div>
        
        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl p-6 shadow-md border-l-4" style="border-color: #FBC605;">
                <div class="text-4xl mb-2">🏆</div>
                <div class="text-gray-600 text-sm font-semibold">Total Certificates</div>
                <div class="text-3xl font-black mt-1" style="color: #343639;" id="cert-count">0</div>
            </div>
            <div class="bg-white rounded-xl p-6 shadow-md border-l-4" style="border-color: #FBC605;">
                <div class="text-4xl mb-2">📸</div>
                <div class="text-gray-600 text-sm font-semibold">Total Activities</div>
                <div class="text-3xl font-black mt-1" style="color: #343639;" id="activity-count">0</div>
            </div>
            <div class="bg-white rounded-xl p-6 shadow-md border-l-4" style="border-color: #FBC605;">
                <div class="text-4xl mb-2">🔥</div>
                <div class="text-gray-600 text-sm font-semibold">Firebase Status</div>
                <div class="text-lg font-bold mt-1" id="firebase-status">
                    <span class="text-green-600">✅ Connected</span>
                </div>
            </div>
        </div>
        
        <!-- Tabs -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="flex border-b border-gray-200">
                <button class="tab-btn active" onclick="switchTab('certificates')">
                    🏆 Certificates
                </button>
                <button class="tab-btn" onclick="switchTab('activities')">
                    📸 Activities
                </button>
            </div>
            
            <!-- Certificates Tab -->
            <div id="certificates-tab" class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black" style="color: #343639;">Manage Certificates</h2>
                    <button onclick="openAddModal('certificates')" class="btn-primary">
                        ➕ Add Certificate
                    </button>
                </div>
                
                <div id="certificates-list" class="space-y-4">
                    <!-- Certificates will be loaded here -->
                </div>
            </div>
            
            <!-- Activities Tab -->
            <div id="activities-tab" class="p-6" style="display: none;">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black" style="color: #343639;">Manage Activities</h2>
                    <button onclick="openAddModal('activities')" class="btn-primary">
                        ➕ Add Activity
                    </button>
                </div>
                
                <div id="activities-list" class="space-y-4">
                    <!-- Activities will be loaded here -->
                </div>
            </div>
        </div>
        
    </main>
    
    <!-- Add/Edit Modal -->
    <div id="item-modal" class="modal">
        <div class="modal-content">
            <h2 class="text-2xl font-black mb-6" style="color: #343639;" id="modal-title">Add Item</h2>
            
            <div class="space-y-4">
                <!-- Image Upload -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Image(s)</label>
                    <div id="upload-zone" class="upload-zone" onclick="document.getElementById('file-input').click()">
                        <div class="text-4xl mb-2">📁</div>
                        <p class="font-bold text-gray-700">Click to upload or drag & drop</p>
                        <p class="text-sm text-gray-500 mt-1">PNG, JPG up to 10MB</p>
                    </div>
                    <input type="file" id="file-input" accept="image/*" multiple style="display: none;" onchange="handleFileSelect(event)">
                    <div id="preview-area" class="mt-4 flex flex-wrap gap-3"></div>
                </div>
                
                <!-- Title -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Title</label>
                    <input type="text" id="item-title" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-yellow-500 focus:outline-none" placeholder="Enter title...">
                </div>
                
                <!-- Description -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Description</label>
                    <textarea id="item-description" rows="4" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-yellow-500 focus:outline-none" placeholder="Enter description..."></textarea>
                </div>
            </div>
            
            <div class="flex gap-3 mt-6">
                <button onclick="saveItem()" class="btn-primary flex-1">
                    💾 Save & Publish
                </button>
                <button onclick="closeItemModal()" class="btn-secondary">
                    Cancel
                </button>
            </div>
        </div>
    </div>
    
    <script>
        // Global State
        let certificates = [];
        let activities = [];
        let currentTab = 'certificates';
        let currentEditIndex = null;
        let currentEditType = null;
        let currentEditId = null;
        let selectedFiles = [];
        
        // Initialize
        async function init() {
            await syncFromFirebase();
            setupDragAndDrop();
        }
        
        // UI Functions
        function switchTab(tab) {
            currentTab = tab;
            
            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Show/hide tabs
            document.getElementById('certificates-tab').style.display = tab === 'certificates' ? 'block' : 'none';
            document.getElementById('activities-tab').style.display = tab === 'activities' ? 'block' : 'none';
        }
        
        function updateStats() {
            document.getElementById('cert-count').textContent = certificates.length;
            document.getElementById('activity-count').textContent = activities.length;
        }
        
        function showAlert(message, type = 'success') {
            const alertArea = document.getElementById('alert-area');
            const alertClass = type === 'success' ? 'alert-success' : type === 'error' ? 'alert-error' : 'alert-warning';
            
            const alert = document.createElement('div');
            alert.className = `alert ${alertClass}`;
            alert.textContent = message;
            
            alertArea.appendChild(alert);
            
            setTimeout(() => {
                alert.remove();
            }, 5000);
        }
        
        // Modal Functions
        function openAddModal(type) {
            currentEditType = type;
            currentEditIndex = null;
            currentEditId = null;
            selectedFiles = [];
            
            document.getElementById('modal-title').textContent = `Add ${type === 'certificates' ? 'Certificate' : 'Activity'}`;
            document.getElementById('item-title').value = '';
            document.getElementById('item-description').value = '';
            document.getElementById('preview-area').innerHTML = '';
            
            document.getElementById('item-modal').classList.add('active');
        }
        
        function openEditModal(type, index, id) {
            currentEditType = type;
            currentEditIndex = index;
            currentEditId = id;
            selectedFiles = [];
            
            const item = type === 'certificates' ? certificates[index] : activities[index];
            
            document.getElementById('modal-title').textContent = `Edit ${type === 'certificates' ? 'Certificate' : 'Activity'}`;
            document.getElementById('item-title').value = item.title;
            document.getElementById('item-description').value = item.description;
            
            // Show existing images
            const previewArea = document.getElementById('preview-area');
            previewArea.innerHTML = '';
            
            const images = type === 'certificates' ? [item.imageUrl] : item.imageUrls;
            images.forEach(url => {
                const div = document.createElement('div');
                div.className = 'text-center';
                div.innerHTML = `
                    <img src="${url}" class="preview-img">
                    <div class="text-xs text-gray-500 mt-1">Existing Image</div>
                `;
                previewArea.appendChild(div);
            });
            
            document.getElementById('item-modal').classList.add('active');
        }
        
        function closeItemModal() {
            document.getElementById('item-modal').classList.remove('active');
            selectedFiles = [];
        }
        
        // File Upload Functions
        function setupDragAndDrop() {
            const uploadZone = document.getElementById('upload-zone');
            
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                uploadZone.addEventListener(eventName, preventDefaults, false);
            });
            
            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }
            
            ['dragenter', 'dragover'].forEach(eventName => {
                uploadZone.addEventListener(eventName, () => {
                    uploadZone.classList.add('dragover');
                });
            });
            
            ['dragleave', 'drop'].forEach(eventName => {
                uploadZone.addEventListener(eventName, () => {
                    uploadZone.classList.remove('dragover');
                });
            });
            
            uploadZone.addEventListener('drop', (e) => {
                const dt = e.dataTransfer;
                const files = dt.files;
                handleFiles(files);
            });
        }
        
        function handleFileSelect(e) {
            handleFiles(e.target.files);
        }
        
        function handleFiles(files) {
            selectedFiles = Array.from(files);
            displayPreviews();
        }
        
        function displayPreviews() {
            const previewArea = document.getElementById('preview-area');
            previewArea.innerHTML = '';
            
            selectedFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const div = document.createElement('div');
                    div.className = 'relative';
                    div.innerHTML = `
                        <img src="${e.target.result}" class="preview-img">
                        <button onclick="removeFile(${index})" class="absolute top-0 right-0 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center font-bold hover:bg-red-600">×</button>
                    `;
                    previewArea.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        }
        
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            displayPreviews();
        }
        
        // Firebase Functions
        async function syncFromFirebase() {
            showAlert('🔄 Syncing from Firebase...', 'warning');
            
            try {
                // Fetch certificates
                const certsSnapshot = await window.firebaseGetDocs(window.firebaseCollection(window.firebaseDB, 'certificates'));
                certificates = certsSnapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                
                // Fetch activities
                const actsSnapshot = await window.firebaseGetDocs(window.firebaseCollection(window.firebaseDB, 'activities'));
                activities = actsSnapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                
                renderList();
                updateStats();
                showAlert('✅ Successfully synced with Firebase!', 'success');
            } catch (error) {
                console.error('Error syncing:', error);
                showAlert('❌ Error syncing: ' + error.message, 'error');
            }
        }
        
        async function saveItem() {
            const title = document.getElementById('item-title').value.trim();
            const description = document.getElementById('item-description').value.trim();
            
            if (!title) {
                showAlert('Please enter a title', 'error');
                return;
            }
            
            if (!description) {
                showAlert('Please enter a description', 'error');
                return;
            }
            
            if (selectedFiles.length === 0 && currentEditIndex === null) {
                showAlert('Please upload at least one image', 'error');
                return;
            }
            
            showAlert('📤 Uploading...', 'warning');
            
            try {
                let imageUrls = [];
                
                // Upload images to Firebase Storage
                if (selectedFiles.length > 0) {
                    for (const file of selectedFiles) {
                        // Sanitize filename
                        const timestamp = Date.now();
                        const sanitizedName = file.name.replace(/[^a-zA-Z0-9.]/g, '_');
                        const filename = `${timestamp}_${sanitizedName}`;
                        const folder = currentEditType === 'certificates' ? 'certificates' : 'activities';
                        const storageRef = window.firebaseRef(window.firebaseStorage, `${folder}/${filename}`);
                        
                        // Upload file
                        await window.firebaseUploadBytes(storageRef, file);
                        
                        // Get download URL
                        const downloadURL = await window.firebaseGetDownloadURL(storageRef);
                        imageUrls.push(downloadURL);
                    }
                }
                
                // Prepare data
                const itemData = {
                    title: title,
                    description: description,
                    createdAt: new Date().toISOString()
                };
                
                if (currentEditType === 'certificates') {
                    itemData.imageUrl = imageUrls.length > 0 ? imageUrls[0] : certificates[currentEditIndex].imageUrl;
                    
                    if (currentEditId) {
                        // Update existing
                        await window.firebaseUpdateDoc(window.firebaseDoc(window.firebaseDB, 'certificates', currentEditId), itemData);
                    } else {
                        // Add new
                        await window.firebaseAddDoc(window.firebaseCollection(window.firebaseDB, 'certificates'), itemData);
                    }
                } else {
                    itemData.imageUrls = imageUrls.length > 0 ? imageUrls : activities[currentEditIndex].imageUrls;
                    
                    if (currentEditId) {
                        // Update existing
                        await window.firebaseUpdateDoc(window.firebaseDoc(window.firebaseDB, 'activities', currentEditId), itemData);
                    } else {
                        // Add new
                        await window.firebaseAddDoc(window.firebaseCollection(window.firebaseDB, 'activities'), itemData);
                    }
                }
                
                await syncFromFirebase();
                closeItemModal();
                showAlert('✅ Successfully published!', 'success');
            } catch (error) {
                console.error('Error saving:', error);
                showAlert('❌ Error saving: ' + error.message, 'error');
            }
        }
        
        async function deleteItem(type, index, id) {
            if (!confirm('Are you sure you want to delete this item?')) return;
            
            showAlert('🗑️ Deleting...', 'warning');
            
            try {
                await window.firebaseDeleteDoc(window.firebaseDoc(window.firebaseDB, type, id));
                await syncFromFirebase();
                showAlert('✅ Successfully deleted!', 'success');
            } catch (error) {
                console.error('Error deleting:', error);
                showAlert('❌ Error deleting: ' + error.message, 'error');
            }
        }
        
        function renderList() {
            // Render certificates
            const certList = document.getElementById('certificates-list');
            if (certificates.length === 0) {
                certList.innerHTML = '<div class="text-center py-12 text-gray-500">No certificates yet. Click "Add Certificate" to get started!</div>';
            } else {
                certList.innerHTML = certificates.map((cert, index) => `
                    <div class="card-item flex gap-4">
                        <div class="flex-shrink-0">
                            <img src="${cert.imageUrl}" alt="${cert.title}" class="w-32 h-20 object-cover rounded-lg">
                        </div>
                        <div class="flex-1">
                            <div class="flex items-start justify-between">
                                <div>
                                    <h3 class="font-black text-lg" style="color: #343639;">${cert.title}</h3>
                                    <p class="text-sm text-gray-600 mt-1">${cert.description.substring(0, 100)}...</p>
                                </div>
                                <span class="badge badge-cert">Certificate</span>
                            </div>
                        </div>
                        <div class="flex-shrink-0 flex gap-2">
                            <button onclick="openEditModal('certificates', ${index}, '${cert.id}')" class="btn-secondary">✏️ Edit</button>
                            <button onclick="deleteItem('certificates', ${index}, '${cert.id}')" class="btn-danger">🗑️ Delete</button>
                        </div>
                    </div>
                `).join('');
            }
            
            // Render activities
            const actList = document.getElementById('activities-list');
            if (activities.length === 0) {
                actList.innerHTML = '<div class="text-center py-12 text-gray-500">No activities yet. Click "Add Activity" to get started!</div>';
            } else {
                actList.innerHTML = activities.map((act, index) => `
                    <div class="card-item flex gap-4">
                        <div class="flex-shrink-0">
                            <img src="${act.imageUrls[0]}" alt="${act.title}" class="w-32 h-20 object-cover rounded-lg">
                        </div>
                        <div class="flex-1">
                            <div class="flex items-start justify-between">
                                <div>
                                    <h3 class="font-black text-lg" style="color: #343639;">${act.title}</h3>
                                    <p class="text-sm text-gray-600 mt-1">${act.description.substring(0, 100)}...</p>
                                    <p class="text-xs text-gray-500 mt-1">📸 ${act.imageUrls.length} photos</p>
                                </div>
                                <span class="badge badge-activity">Activity</span>
                            </div>
                        </div>
                        <div class="flex-shrink-0 flex gap-2">
                            <button onclick="openEditModal('activities', ${index}, '${act.id}')" class="btn-secondary">✏️ Edit</button>
                            <button onclick="deleteItem('activities', ${index}, '${act.id}')" class="btn-danger">🗑️ Delete</button>
                        </div>
                    </div>
                `).join('');
            }
        }
        
        // Wait for Firebase to initialize
        setTimeout(() => {
            init();
        }, 1000);
    </script>
</body>
</html>
