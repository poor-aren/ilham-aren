<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1524, initial-scale=1.0, minimum-scale=0.2, maximum-scale=2.0, user-scalable=yes">
    <title>My Certificates - Muhammad Ilham | Aren</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            min-width: 1024px;
            zoom: 0.67;
        }
        
        .nav-link {
            position: relative;
            padding: 0.5rem 1rem;
            transition: all 0.3s ease;
            font-weight: 600;
            color: #4b5563;
        }

        .nav-link:hover {
            color: #1f2937;
        }

        .nav-link.active {
            color: #1f2937;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 3px;
            background: #FBC605;
            transform: translateX(-50%);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 80%;
        }

        .hero-section {
            background: #343639;
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(251, 198, 5, 0.15) 0%, transparent 70%);
            animation: pulse-glow 8s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .name-highlight {
            color: #FBC605;
        }

        .cert-card {
            background: white;
            border: 3px solid #343639;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .cert-card:hover {
            transform: translateY(-8px) rotate(1deg);
            border-color: #FBC605;
            box-shadow: 0 15px 35px rgba(251, 198, 5, 0.3);
        }

        .cert-card img {
            transition: all 0.3s ease;
        }

        .cert-card:hover img {
            transform: scale(1.05);
        }

        .cert-title {
            font-weight: 800;
            color: #343639;
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .cert-description {
            color: #6b7280;
            font-size: 0.875rem;
            line-height: 1.5;
        }

        /* Lightbox styles */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }

        .lightbox.active .lightbox-content {
            transform: scale(1);
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 90vh;
            border: 4px solid #FBC605;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(251, 198, 5, 0.3);
        }

        .close-btn {
            position: absolute;
            top: -50px;
            right: 0;
            background: #FBC605;
            color: #343639;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            border: 3px solid #343639;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            transform: rotate(90deg) scale(1.1);
            background: #343639;
            color: #FBC605;
        }

        /* Cute floating animation */
        @keyframes float-cert {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .cert-card:nth-child(odd) {
            animation: float-cert 6s ease-in-out infinite;
        }

        .cert-card:nth-child(even) {
            animation: float-cert 6s ease-in-out infinite 0.5s;
        }

        /* Star decorations */
        .star {
            position: absolute;
            color: #FBC605;
            opacity: 0.3;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }
    </style>
</head>
<body class="text-gray-900 min-h-screen" style="background-image: url('./assets/background.jpg'); background-size: cover; background-position: center;">
    
    <div class="max-w-6xl mx-auto px-6 py-12">
        
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden mb-12" style="max-width: 1152px; margin-left: auto; margin-right: auto;">
            
            <!-- Navigation -->
            <div style="background: white;">
                <nav class="flex justify-end gap-1 px-8 py-4">
                    <a href="./index.html" class="nav-link text-base">HOME</a>
                    <a href="./certificates.html" class="nav-link active text-base">MY CERTIFICATES</a>
                    <a href="./activities.html" class="nav-link text-base">MY ACTIVITIES</a>
                    <a href="./aboutme.html" class="nav-link text-base">ABOUT ME</a>
                </nav>
            </div>

            <!-- Hero Section -->
            <div class="hero-section p-16 text-center relative">
                <div class="relative z-10">
                    <h1 class="text-5xl font-black text-white mb-3">
                        MY <span class="name-highlight">CERTIFICATES</span>
                    </h1>
                    <p class="text-white text-xl font-medium mb-6">Achievements & Accomplishments</p>
                    <p class="text-white text-sm font-normal max-w-3xl mx-auto opacity-90">
                        A collection of my certifications and achievements throughout my journey in tech and digital arts.
                    </p>
                </div>
                <!-- Cute stars decoration -->
                <div class="star" style="top: 10%; left: 10%; font-size: 20px;">★</div>
                <div class="star" style="top: 20%; right: 15%; font-size: 16px;">★</div>
                <div class="star" style="bottom: 15%; left: 20%; font-size: 18px;">★</div>
                <div class="star" style="bottom: 20%; right: 10%; font-size: 22px;">★</div>
            </div>

            <!-- Certificates Grid -->
            <div class="p-12">
                <div id="certificates-container" class="grid grid-cols-2 gap-8">
                    <!-- Certificates will be loaded here -->
                </div>

                <!-- Empty state -->
                <div id="empty-state" class="text-center py-20" style="display: none;">
                    <div class="text-6xl mb-4">📜</div>
                    <h3 class="text-2xl font-black mb-2" style="color: #343639;">No Certificates Yet</h3>
                    <p class="text-gray-600">Certificates will appear here once added to certificates.json</p>
                </div>
            </div>

        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-content">
            <div class="close-btn" onclick="closeLightbox()">×</div>
            <img id="lightbox-img" class="lightbox-img" src="" alt="">
        </div>
    </div>

    <script>
        // Load certificates from JSON
        async function loadCertificates() {
            try {
                const response = await fetch('./assets/certificates/certificates.json');
                const certificates = await response.json();
                
                const container = document.getElementById('certificates-container');
                const emptyState = document.getElementById('empty-state');
                
                if (certificates.length === 0) {
                    container.style.display = 'none';
                    emptyState.style.display = 'block';
                    return;
                }
                
                container.innerHTML = '';
                
                certificates.forEach((cert, index) => {
                    const certCard = document.createElement('div');
                    certCard.className = 'cert-card';
                    certCard.style.animationDelay = `${index * 0.1}s`;
                    certCard.onclick = () => openLightbox(cert.image);
                    
                    certCard.innerHTML = `
                        <div class="overflow-hidden">
                            <img src="./assets/certificates/${cert.image}" 
                                 alt="${cert.title}" 
                                 class="w-full h-64 object-cover"
                                 onerror="this.src='https://via.placeholder.com/600x400?text=Certificate'">
                        </div>
                        <div class="p-6">
                            <h3 class="cert-title">${cert.title}</h3>
                            <p class="cert-description">${cert.description}</p>
                        </div>
                    `;
                    
                    container.appendChild(certCard);
                });
                
            } catch (error) {
                console.error('Error loading certificates:', error);
                document.getElementById('empty-state').style.display = 'block';
                document.getElementById('certificates-container').style.display = 'none';
            }
        }

        // Lightbox functions
        function openLightbox(imagePath) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            
            lightboxImg.src = `./assets/certificates/${imagePath}`;
            lightbox.classList.add('active');
            
            // Prevent body scroll
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            
            // Re-enable body scroll
            document.body.style.overflow = 'auto';
        }

        // Close lightbox on clicking background
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) {
                closeLightbox();
            }
        });

        // Close lightbox with ESC key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeLightbox();
            }
        });

        // Load certificates on page load
        loadCertificates();
    </script>

</body>
</html>
