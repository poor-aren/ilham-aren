backend:
  name: git-gateway
  branch: main

media_folder: "assets/certificates"
public_folder: "/assets/certificates"

collections:
  # ========================================
  # CERTIFICATES COLLECTION
  # ========================================
  - name: "certificates_data"
    label: "Certificates"
    files:
      - name: "all_certificates"
        label: "All Certificates"
        file: "assets/certificates/certificates.json"
        fields:
          - label: "Certificates List"
            name: "certificates"
            widget: "list"
            fields:
              - {label: "Image Filename", name: "image", widget: "string", hint: "e.g., pimnas38.jpg"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}

  # ========================================
  # ACTIVITIES COLLECTION  
  # ========================================
  - name: "activities_data"
    label: "Activities"
    files:
      - name: "all_activities"
        label: "All Activities"
        file: "assets/activities/activities.json"
        fields:
          - label: "Activities List"
            name: "activities"
            widget: "list"
            fields:
              - label: "Images"
                name: "images"
                widget: "list"
                field: {label: "Image Filename", name: "image", widget: "string", hint: "e.g., photo1.jpg"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
