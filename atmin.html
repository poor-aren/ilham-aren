<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Admin - Muhammad Ilham</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        .tab-btn { padding: 12px 24px; border-radius: 8px 8px 0 0; font-weight: 600; transition: all 0.3s; cursor: pointer; }
        .tab-btn.active { background: #FBC605; color: #343639; }
        .tab-btn:not(.active) { background: #e5e7eb; color: #6b7280; }
        .tab-btn:not(.active):hover { background: #d1d5db; }
        .card-item { background: white; border: 2px solid #e5e7eb; border-radius: 12px; padding: 16px; transition: all 0.3s; }
        .card-item:hover { border-color: #FBC605; box-shadow: 0 4px 12px rgba(251, 198, 5, 0.2); }
        .btn-primary { background: #FBC605; color: #343639; padding: 12px 24px; border-radius: 8px; font-weight: 700; transition: all 0.3s; border: none; cursor: pointer; }
        .btn-primary:hover { background: #e5b105; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(251, 198, 5, 0.3); }
        .btn-danger { background: #ef4444; color: white; padding: 8px 16px; border-radius: 6px; font-weight: 600; transition: all 0.3s; border: none; cursor: pointer; }
        .btn-danger:hover { background: #dc2626; }
        .btn-secondary { background: #6b7280; color: white; padding: 8px 16px; border-radius: 6px; font-weight: 600; transition: all 0.3s; border: none; cursor: pointer; }
        .btn-secondary:hover { background: #4b5563; }
        .upload-zone { border: 3px dashed #d1d5db; border-radius: 12px; padding: 40px; text-align: center; transition: all 0.3s; cursor: pointer; background: #f9fafb; }
        .upload-zone:hover { border-color: #FBC605; background: #fffbf0; }
        .preview-img { max-width: 200px; max-height: 200px; border-radius: 8px; border: 3px solid #FBC605; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 16px; padding: 32px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .badge-cert { background: #dbeafe; color: #1e40af; }
        .badge-activity { background: #fce7f3; color: #be123c; }
        .alert { padding: 16px; border-radius: 8px; margin-bottom: 16px; font-weight: 600; }
        .alert-success { background: #d1fae5; color: #065f46; }
        .alert-error { background: #fee2e2; color: #991b1b; }
        .alert-warning { background: #fef3c7; color: #92400e; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <header class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-6 py-6">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-black" style="color: #343639;">📁 Portfolio Admin</h1>
                    <p class="text-gray-600 mt-1">Manage your certificates & activities</p>
                </div>
                <div><button onclick="syncFromAPI()" class="btn-primary">🔄 Sync</button></div>
            </div>
        </div>
    </header>
    
    <main class="max-w-7xl mx-auto px-6 py-8">
        <div id="alert-area"></div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl p-6 shadow-md border-l-4" style="border-color: #FBC605;">
                <div class="text-4xl mb-2">🏆</div>
                <div class="text-gray-600 text-sm font-semibold">Total Certificates</div>
                <div class="text-3xl font-black mt-1" style="color: #343639;" id="cert-count">0</div>
            </div>
            <div class="bg-white rounded-xl p-6 shadow-md border-l-4" style="border-color: #FBC605;">
                <div class="text-4xl mb-2">📸</div>
                <div class="text-gray-600 text-sm font-semibold">Total Activities</div>
                <div class="text-3xl font-black mt-1" style="color: #343639;" id="activity-count">0</div>
            </div>
            <div class="bg-white rounded-xl p-6 shadow-md border-l-4" style="border-color: #FBC605;">
                <div class="text-4xl mb-2">🌐</div>
                <div class="text-gray-600 text-sm font-semibold">API Status</div>
                <div class="text-lg font-bold mt-1" id="api-status"><span class="text-green-600">✅ Ready</span></div>
            </div>
        </div>
        
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="flex border-b border-gray-200">
                <button class="tab-btn active" onclick="switchTab('certificates')">🏆 Certificates</button>
                <button class="tab-btn" onclick="switchTab('activities')">📸 Activities</button>
            </div>
            
            <div id="certificates-tab" class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black" style="color: #343639;">Manage Certificates</h2>
                    <button onclick="openAddModal('certificates')" class="btn-primary">➕ Add Certificate</button>
                </div>
                <div id="certificates-list" class="space-y-4"></div>
            </div>
            
            <div id="activities-tab" class="p-6" style="display: none;">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black" style="color: #343639;">Manage Activities</h2>
                    <button onclick="openAddModal('activities')" class="btn-primary">➕ Add Activity</button>
                </div>
                <div id="activities-list" class="space-y-4"></div>
            </div>
        </div>
    </main>
    
    <div id="item-modal" class="modal">
        <div class="modal-content">
            <h2 class="text-2xl font-black mb-6" style="color: #343639;" id="modal-title">Add Item</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Image(s)</label>
                    <div id="upload-zone" class="upload-zone" onclick="openCloudinaryWidget()">
                        <div class="text-4xl mb-2">☁️</div>
                        <p class="font-bold text-gray-700">Click to upload via Cloudinary</p>
                        <p class="text-sm text-gray-500 mt-1">PNG, JPG - Auto optimization!</p>
                    </div>
                    <div id="preview-area" class="mt-4 flex flex-wrap gap-3"></div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Title</label>
                    <input type="text" id="item-title" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-yellow-500 focus:outline-none" placeholder="Enter title...">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Description</label>
                    <textarea id="item-description" rows="4" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-yellow-500 focus:outline-none" placeholder="Enter description..."></textarea>
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="saveItem()" class="btn-primary flex-1">💾 Save & Publish</button>
                <button onclick="closeItemModal()" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>
    
    <script>
        // CONFIG - GANTI INI!
        const JSONBIN_API_KEY = '$2a$10$0p5f.8.7MaVHfCRw6y28wuozbrEphXg0vBuLRVccJXXZgGIL0kpD.'; // GANTI INI!
        const JSONBIN_BIN_ID = '6989f92bd0ea881f40ad5b6c'; // GANTI INI!
        
        let certificates = [];
        let activities = [];
        let currentTab = 'certificates';
        let currentEditIndex = null;
        let currentEditType = null;
        let uploadedImageUrls = [];
        
        async function init() {
            await syncFromAPI();
        }
        
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('certificates-tab').style.display = tab === 'certificates' ? 'block' : 'none';
            document.getElementById('activities-tab').style.display = tab === 'activities' ? 'block' : 'none';
        }
        
        function updateStats() {
            document.getElementById('cert-count').textContent = certificates.length;
            document.getElementById('activity-count').textContent = activities.length;
        }
        
        function showAlert(message, type = 'success') {
            const alertArea = document.getElementById('alert-area');
            const alertClass = type === 'success' ? 'alert-success' : type === 'error' ? 'alert-error' : 'alert-warning';
            const alert = document.createElement('div');
            alert.className = `alert ${alertClass}`;
            alert.textContent = message;
            alertArea.appendChild(alert);
            setTimeout(() => alert.remove(), 5000);
        }
        
        function openAddModal(type) {
            currentEditType = type;
            currentEditIndex = null;
            uploadedImageUrls = [];
            document.getElementById('modal-title').textContent = `Add ${type === 'certificates' ? 'Certificate' : 'Activity'}`;
            document.getElementById('item-title').value = '';
            document.getElementById('item-description').value = '';
            document.getElementById('preview-area').innerHTML = '';
            document.getElementById('item-modal').classList.add('active');
        }
        
        function openEditModal(type, index) {
            currentEditType = type;
            currentEditIndex = index;
            uploadedImageUrls = [];
            const item = type === 'certificates' ? certificates[index] : activities[index];
            document.getElementById('modal-title').textContent = `Edit ${type === 'certificates' ? 'Certificate' : 'Activity'}`;
            document.getElementById('item-title').value = item.title;
            document.getElementById('item-description').value = item.description;
            const previewArea = document.getElementById('preview-area');
            previewArea.innerHTML = '';
            const images = type === 'certificates' ? [item.image] : item.images;
            images.forEach(url => {
                const div = document.createElement('div');
                div.className = 'relative';
                div.innerHTML = `<img src="${url}" class="preview-img"><div class="text-xs text-gray-500 mt-1 text-center">Existing Image</div>`;
                previewArea.appendChild(div);
            });
            document.getElementById('item-modal').classList.add('active');
        }
        
        function closeItemModal() {
            document.getElementById('item-modal').classList.remove('active');
            uploadedImageUrls = [];
        }
        
        function openCloudinaryWidget() {
            const widget = cloudinary.createUploadWidget({
                cloudName: CLOUDINARY_CLOUD_NAME,
                uploadPreset: CLOUDINARY_UPLOAD_PRESET,
                multiple: currentEditType === 'activities',
                maxFiles: currentEditType === 'activities' ? 10 : 1,
                clientAllowedFormats: ['png', 'jpg', 'jpeg', 'webp'],
                maxFileSize: 10000000,
                folder: currentEditType === 'certificates' ? 'certificates' : 'activities',
                sources: ['local', 'url', 'camera'],
                styles: { palette: { window: '#FFFFFF', windowBorder: '#FBC605', tabIcon: '#343639', action: '#FBC605' } }
            }, (error, result) => {
                if (!error && result && result.event === "success") {
                    uploadedImageUrls.push(result.info.secure_url);
                    displayUploadedImages();
                    showAlert('✅ Image uploaded!', 'success');
                }
            });
            widget.open();
        }
        
        function displayUploadedImages() {
            const previewArea = document.getElementById('preview-area');
            previewArea.innerHTML = '';
            uploadedImageUrls.forEach((url, index) => {
                const div = document.createElement('div');
                div.className = 'relative';
                div.innerHTML = `<img src="${url}" class="preview-img"><button onclick="removeUploadedImage(${index})" class="absolute top-0 right-0 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center font-bold hover:bg-red-600">×</button>`;
                previewArea.appendChild(div);
            });
        }
        
        function removeUploadedImage(index) {
            uploadedImageUrls.splice(index, 1);
            displayUploadedImages();
        }
        
        async function saveItem() {
            const title = document.getElementById('item-title').value.trim();
            const description = document.getElementById('item-description').value.trim();
            
            if (!title || !description) {
                showAlert('Please fill all fields', 'error');
                return;
            }
            
            if (uploadedImageUrls.length === 0 && currentEditIndex === null) {
                showAlert('Please upload at least one image', 'error');
                return;
            }
            
            if (currentEditType === 'certificates') {
                const item = {
                    image: uploadedImageUrls.length > 0 ? uploadedImageUrls[0] : certificates[currentEditIndex].image,
                    title: title,
                    description: description
                };
                if (currentEditIndex !== null) {
                    certificates[currentEditIndex] = item;
                } else {
                    certificates.push(item);
                }
            } else {
                const item = {
                    images: uploadedImageUrls.length > 0 ? uploadedImageUrls : activities[currentEditIndex].images,
                    title: title,
                    description: description
                };
                if (currentEditIndex !== null) {
                    activities[currentEditIndex] = item;
                } else {
                    activities.push(item);
                }
            }
            
            await saveToAPI();
            renderList();
            closeItemModal();
        }
        
        async function deleteItem(type, index) {
            if (!confirm('Are you sure?')) return;
            if (type === 'certificates') {
                certificates.splice(index, 1);
            } else {
                activities.splice(index, 1);
            }
            await saveToAPI();
            renderList();
        }
        
        async function saveToAPI() {
            showAlert('📤 Saving to API...', 'warning');
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify({ certificates, activities })
                });
                if (!response.ok) throw new Error('Failed to save');
                showAlert('✅ Saved successfully!', 'success');
                updateStats();
            } catch (error) {
                showAlert('❌ Error: ' + error.message, 'error');
            }
        }
        
        async function syncFromAPI() {
            showAlert('🔄 Loading from API...', 'warning');
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                if (!response.ok) throw new Error('Failed to load');
                const data = await response.json();
                certificates = data.record.certificates || [];
                activities = data.record.activities || [];
                renderList();
                updateStats();
                showAlert('✅ Loaded successfully!', 'success');
            } catch (error) {
                showAlert('❌ Error: ' + error.message, 'error');
            }
        }
        
        function renderList() {
            const certList = document.getElementById('certificates-list');
            if (certificates.length === 0) {
                certList.innerHTML = '<div class="text-center py-12 text-gray-500">No certificates yet</div>';
            } else {
                certList.innerHTML = certificates.map((cert, index) => `
                    <div class="card-item flex gap-4">
                        <div class="flex-shrink-0"><img src="${cert.image}" alt="${cert.title}" class="w-32 h-20 object-cover rounded-lg"></div>
                        <div class="flex-1">
                            <div class="flex items-start justify-between">
                                <div>
                                    <h3 class="font-black text-lg" style="color: #343639;">${cert.title}</h3>
                                    <p class="text-sm text-gray-600 mt-1">${cert.description.substring(0, 100)}...</p>
                                </div>
                                <span class="badge badge-cert">Certificate</span>
                            </div>
                        </div>
                        <div class="flex-shrink-0 flex gap-2">
                            <button onclick="openEditModal('certificates', ${index})" class="btn-secondary">✏️ Edit</button>
                            <button onclick="deleteItem('certificates', ${index})" class="btn-danger">🗑️ Delete</button>
                        </div>
                    </div>
                `).join('');
            }
            
            const actList = document.getElementById('activities-list');
            if (activities.length === 0) {
                actList.innerHTML = '<div class="text-center py-12 text-gray-500">No activities yet</div>';
            } else {
                actList.innerHTML = activities.map((act, index) => `
                    <div class="card-item flex gap-4">
                        <div class="flex-shrink-0"><img src="${act.images[0]}" alt="${act.title}" class="w-32 h-20 object-cover rounded-lg"></div>
                        <div class="flex-1">
                            <div class="flex items-start justify-between">
                                <div>
                                    <h3 class="font-black text-lg" style="color: #343639;">${act.title}</h3>
                                    <p class="text-sm text-gray-600 mt-1">${act.description.substring(0, 100)}...</p>
                                    <p class="text-xs text-gray-500 mt-1">📸 ${act.images.length} photos</p>
                                </div>
                                <span class="badge badge-activity">Activity</span>
                            </div>
                        </div>
                        <div class="flex-shrink-0 flex gap-2">
                            <button onclick="openEditModal('activities', ${index})" class="btn-secondary">✏️ Edit</button>
                            <button onclick="deleteItem('activities', ${index})" class="btn-danger">🗑️ Delete</button>
                        </div>
                    </div>
                `).join('');
            }
        }
        
        init();
    </script>
</body>
</html>
